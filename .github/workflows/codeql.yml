name: CodeQL

# Static security analysis via GitHub CodeQL.
#
# Runs on:
# - pushes to `main` (baseline for the default branch)
# - pull requests targeting `main` (catch new issues before merge)
# - weekly on Monday 06:00 UTC (catch newly added CodeQL queries against
#   the existing codebase without requiring a new commit)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` adds code-quality queries on top of
          # the default `security-extended` set. Trades longer analysis
          # for catching more issues.
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
