version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    groups:
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-native"
          - "react-native-web"
          - "@types/react*"
      build-tools:
        patterns:
          - "biome*"
          - "@biomejs/*"
          - "turbo"
          - "tsdown"
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
      ci-tooling:
        patterns:
          - "husky"
          - "lint-staged"
          - "@changesets/*"
          - "@commitlint/*"
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "@mdx-js/*"
      markdown-peers:
        patterns:
          - "commonmark"
          - "markdown-it"
          - "marked"
          - "html-minifier-terser"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - ci
